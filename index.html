<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="링크 모음">
<title>링크 모음</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f0f0f;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3.5rem 1.25rem 2rem;
    color: #f0f0f0;
  }

  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 2rem;
    text-align: center;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  a.card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  a.card:active {
    transform: scale(0.97);
    background: #222;
  }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: #f0f0f0;
  }

  .card-arrow {
    font-size: 18px;
    color: #555;
    line-height: 1;
  }
</style>
</head>
<body>

<h1>내 링크 모음</h1>

<div class="links">
  <a class="card" href="https://skku-hyu-lib-new.vercel.app/" target="_blank" rel="noopener">
    <span class="card-name">📚 New Book Collector</span>
    <span class="card-arrow">→</span>
  </a>
  <a class="card" href="https://joon-strong-87.github.io/skku-meal/" target="_blank" rel="noopener">
    <span class="card-name">🍱 Daily Meal Collector</span>
    <span class="card-arrow">→</span>
  </a>
</div>

</body>
</html>
